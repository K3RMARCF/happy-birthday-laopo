<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Our Story ❤️</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Sacramento&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="hero">

        ```
        <h1>Our Story ❤️</h1>

        <p>
            Every picture tells a story...
        </p>

        <button id="startBtn">
            Begin Journey ✨
        </button>
        ```

    </div>

    <div id="storyContainer"
         class="hidden">

        ```
        <div class="progress">

            <span id="progressText">
                Memory 1 / 1
            </span>

        </div>

        <div class="memory-card">

            <div id="mediaContainer">

            </div>

            <div id="memoryTitle"
                 class="memory-title"></div>

            <button id="noteBtn">
                💌 Read My Note
            </button>

            <div id="note"
                 class="note hidden"></div>

        </div>

        <button id="nextBtn">
            Next Memory →
        </button>
        ```

    </div>

    <script src="script.js"></script>

</body>

</html>
