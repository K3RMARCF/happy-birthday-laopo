<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plan Our Date ❤️</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

</head>

<body>

    <div class="container">

        ```
        <h1>Choose TWO Adventures ❤️</h1>

        <p>
            Pick the two activities you'd enjoy most today.
        </p>

        <div class="cards">

            <div class="card" data-activity="Picnic">
                🌸
                <span>Picnic</span>
            </div>

            <div class="card" data-activity="Bowling">
                🎳
                <span>Bowling</span>
            </div>

            <div class="card" data-activity="Gold Shopping">
                🛍️
                <span>Gold Shopping</span>
            </div>

            <div class="card" data-activity="Bookstore">
                📚
                <span>Bookstore</span>
            </div>

        </div>

        <button id="submitBtn">
            Submit Choices ❤️
        </button>
        ```

    </div>

    <script src="script.js"></script>

</body>

</html>
